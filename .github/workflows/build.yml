name: Build Expo Web

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Expo Web
        run: npx expo export:web

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: expo-web-build
          path: dist
